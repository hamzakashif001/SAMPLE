<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FBF7F1" />

    <script>
      // Apply the saved/preferred theme before paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem('theme')
          var dark = saved
            ? saved === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches
          if (dark) {
            document.documentElement.classList.add('dark')
            var m = document.querySelector('meta[name="theme-color"]')
            if (m) m.setAttribute('content', '#15100B')
          }
        } catch (e) {}
      })()
    </script>
    <meta
      name="description"
      content="Lumière Skin Clinic — medically-led dermatology and aesthetics in F-7 Markaz, Islamabad. Botox, fillers, lasers, Hydrafacial and clinical skin care by MBBS, FCPS specialists."
    />
    <meta property="og:title" content="Lumière Skin Clinic — Dermatology & Aesthetics, Islamabad" />
    <meta
      property="og:description"
      content="Clinical skin health and professional aesthetic procedures, led by qualified specialists in F-7 Markaz, Islamabad."
    />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Jost:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>Lumière Skin Clinic — Dermatology & Aesthetics, Islamabad</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
